name: JavaScript (WASM)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bindings/js/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: npm ci
        working-directory: bindings/js
        run: npm ci

      - name: wasm-pack build --mode no-install
        working-directory: bindings/js/wasm
        run: wasm-pack build --release --mode no-install


